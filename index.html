<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Pakar</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background: radial-gradient(circle at top, #f5f7f6, #e6ecea);
  color:#1f2937;
}

.glass{
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(14px);
  border:1px solid rgba(0,0,0,0.05);
}

.soft-card{
  background:#ffffff;
  border:1px solid #e5e7eb;
  transition:0.25s;
}

.soft-card:hover{
  transform:scale(1.02);
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.accent{
  background: linear-gradient(to right, #7d682f, #baa46c);
  color:white;
}

.btn-main{
  background: linear-gradient(to right, #7d682f, #baa46c);
  color:white;
  transition:0.25s;
}

.btn-main:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(125,104,47,0.4);
}

.badge{
  font-size:12px;
  padding:3px 10px;
  border-radius:999px;
  background:#f5efe1;
  color:#7d682f;
}

.fade{
  animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px)}
  to{opacity:1; transform:translateY(0)}
}
</style>

</head>

<body class="font-sans">

<main class="max-w-6xl mx-auto px-4 py-12">

    <!-- HEADER -->
    <div class="glass rounded-2xl p-8 mb-10 text-center">
        <h1 class="text-4xl font-bold mb-2">Sistem Pakar</h1>
        <p class="text-gray-600">Deteksi Kerusakan Komputer</p>
    </div>

    <!-- SEARCH -->
    <div class="mb-8 relative">
        <input type="text" id="search"
            placeholder="Cari gejala..."
            class="w-full p-4 pr-12 text-lg rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-300">

        <button type="button" onclick="clearSearch()"
            class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-700 text-xl z-10">
            ✕
        </button>
    </div>

    <!-- GRID -->
    <div class="grid lg:grid-cols-3 gap-8">

        <!-- LIST -->
        <div id="list" class="lg:col-span-2 grid sm:grid-cols-2 lg:grid-cols-3 gap-4 max-h-[520px] overflow-y-auto pr-2"></div>

        <!-- SIDE PANEL -->
        <div class="glass rounded-2xl p-6 h-fit">
            <h2 class="font-semibold mb-4">Hasil Diagnosa</h2>

            <div id="hasil"
                class="mb-4 p-4 rounded-xl hidden border bg-white fade text-sm">
            </div>

            <h3 class="font-medium mb-2">Pilihan Kamu</h3>
            <p id="count" class="text-sm text-gray-500 mb-4">0 gejala dipilih</p>

            <button onclick="diagnosa()"
                class="w-full btn-main text-white py-3 rounded-xl mb-3">
                Diagnosa
            </button>

            <button onclick="resetForm()"
                class="w-full bg-gray-200 py-3 rounded-xl hover:bg-gray-300">
                Reset
            </button>
        </div>

    </div>

    <!-- HASIL -->
    <div id="hasil"
        class="mt-10 p-6 rounded-2xl hidden border bg-white fade">
    </div>

</main>

<script>
const data = [
"B1 - Tidak ada gambar tertampil di monitor",
"B2 - Terdapat garis horisontal/vertikal ditengah monitor",
"B3 - Tidak ada tampilan awal BIOS",
"B4 - Muncul pesan error pada BIOS (isi pesan selalu berbeda tergantung pada kondisi tertentu)",
"B5 - Alarm BIOS berbunyi",
"B6 - Terdengar suara aneh pada HDD",
"B7 - Sering terjadi hang/crash saat menjalankan aplikasi",
"B8 - Selalu scandisk ketika booting",
"B9 - Muncul pesan error saat menjalankan game atau aplikasi grafis",
"B10 - Device driver informasi tidak terdeteksi dalam device manager, meski driver telah di install",
"B11 - Tiba-tiba OS melakukan restart otomatis",
"B12 - Keluarnya blue screen pada OS Windows (isi pesan selalu berbeda tergantung pada kondisi tertentu)",
"B13 - Suara tetap tidak keluar meskipun driver dan setting device telah dilakukan sesuai petunjuk",
"B14 - Muncul pesan error saat menjalankan aplikasi audio",
"B15 - Muncul pesan error saat pertama OS di load dari HDD",
"B16 - Tidak ada tanda-tanda dari sebagian/seluruh perangkat bekerja (semua kipas pendinginan tidak berputar)",
"B17 - Sering tiba-tiba mati tanpa sebab",
"B18 - Muncul pesan pada windows, bahwa windows kekurangan virtual memori",
"B19 - Aplikasi berjalan dengan lambat, respin yang lambat terhadap inputan",
"B20 - Kinerja grafis terasa sangat berat (biasanya dalam game dan manipulasi gambar)",
"B21 - Device tidak terdeteksi dalam BIOS",
"B22 - Informasi deteksi yang salah dalam BIOS",
"B23 - Hanya sebagian perangkat yang bekerja",
"B24 - Sebagian/seluruh karakter inputan mati",
"B25 - Pointer mouse tidak merespon gerakan mouse"
];

const list = document.getElementById("list");
let selected = [];

function renderList(filter="") {
    list.innerHTML = "";

    data.forEach((g, i) => {
        if (g.toLowerCase().includes(filter.toLowerCase())) {

            let isActive = selected.includes(i+1);

            list.innerHTML += `
            <div onclick="toggle(${i+1})"
                class="soft-card p-3 rounded-lg cursor-pointer flex gap-2 items-start
                ${isActive ? 'ring-2 ring-yellow-500' : ''}">

                <div class="w-6 h-6 min-w-[24px] min-h-[24px] rounded-full border flex items-center justify-center text-sm flex-shrink-0
                    ${isActive ? 'accent' : 'border-gray-400'}">
                    ${isActive ? '✓' : ''}
                </div>

                <div>
                    <span class="badge text-sm">B${i+1}</span>
                    <p class="mt-1 text-sm text-gray-700 line-clamp-2">${g.split(' - ')[1]}</p>
                </div>

            </div>`;
        }
    });

    document.getElementById("count").innerText = selected.length + " gejala dipilih";
}

function toggle(val) {
    if (selected.includes(val)) {
        selected = selected.filter(x => x !== val);
    } else {
        selected.push(val);
    }
    renderList(document.getElementById("search").value);
}

document.getElementById("search").addEventListener("keyup", (e) => {
    renderList(e.target.value);
});

renderList();

function clearSearch() {
    const input = document.getElementById("search");
    input.value = "";
    input.focus();
    renderList();
}

const rules = [
{rule:[1,2], hasil:"Monitor Rusak"},
{rule:[3,4,5,11,12], hasil:"Memori Rusak"},
{rule:[6,7,8,10,21,22], hasil:"HDD Rusak"},
{rule:[1,3,5,9,10,12,13], hasil:"VGA Rusak"},
{rule:[10,13,14], hasil:"Sound Card Rusak"},
{rule:[11,15], hasil:"OS Bermasalah"},
{rule:[7,12], hasil:"Aplikasi Rusak"},
{rule:[16,17], hasil:"PSU Rusak"},
{rule:[1,3,4,5], hasil:"Prosesor Rusak"},
{rule:[18,19], hasil:"Memory Kurang (Perlu Upgrade Memory)"},
{rule:[9,20], hasil:"Memory VGA Kurang (Perlu Upgrade VGA)"},
{rule:[19], hasil:"Clock Prosesor Tinggi (perlu Upgrade Prosesor)"},
{rule:[21], hasil:"Kabel IDE Rusak"},
{rule:[5,23], hasil:"Kurang Daya Pada PSU (perlu Upgrade PSU)"},
{rule:[10], hasil:"Perangkat USB Rusak"},
{rule:[10,24], hasil:"Keyboard Rusak"},
{rule:[10,25], hasil:"Mouse Rusak"}
];

function diagnosa() {
    let hasil = "Tidak ditemukan";
    let max = 0;

    rules.forEach(r => {
        let cocok = r.rule.filter(x => selected.includes(x)).length;
        if (cocok === r.rule.length && cocok > max) {
            max = cocok;
            hasil = r.hasil;
        }
    });

    let box = document.getElementById("hasil");
    box.classList.remove("hidden");
    box.innerHTML = `<div class="text-lg font-semibold mb-2">Hasil Diagnosa</div>
    <div class="text-yellow-700 font-bold">${hasil}</div>`;
}

function resetForm() {
    selected = [];
    renderList();
    document.getElementById("hasil").classList.add("hidden");
}
</script>

</body>
</html>
